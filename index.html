<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <!-- Адаптивність -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO опис -->
    <meta name="description" content="Онлайн бібліотека з великим вибором книг. Читайте книги онлайн безкоштовно.">
    <!-- Open Graph -->
    <meta property="og:title" content="Головна | Онлайн бібліотека">

        content="Читайте улюблені книги онлайн. Велика електронна бібліотека для студентів та книголюбів.">
    <meta property="og:image" content="images/icon/logo.png">

</head>

<body>
    <header>
        <h1>Онлайн бібліотека</h1>
        <nav>
            <a href="index.html">Головна</a>
            <a href="catalog.html">Каталог</a>
            <a href="contacts.html">Контакти</a>
        </nav>

    </header>
    <main>
        <picture>
            <!-- для великих екранів -->
            <source media="(min-width: 800px)" srcset="images/library-home.jpg">

            <!-- базове зображення, якщо браузер не підтримує picture -->
            <img src="images/library-home.jpg" alt="Онлайн бібліотека з книгами">
        </picture>

        <audio controls>

        </audio>

        <p>Ласкаво просимо до нашого магазину онлайн-книг!</p>
    </main>

</body>

</html>
